<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Balance — Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #222;
            --border: rgba(255, 255, 255, 0.07);
            --text: #f0f0f0;
            --muted: rgba(255, 255, 255, 0.4);
            --accent: #7F77DD;
            --green: #1D9E75;
            --red: #E24B4A;
            --amber: #BA7517;
            --radius: 10px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 500;
        }

        .header-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 3px;
        }

        .setup-banner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .setup-banner label {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
        }

        .setup-banner input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 12px;
            padding: 7px 10px;
            outline: none;
        }

        .setup-banner input:focus {
            border-color: var(--accent);
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .metric {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
        }

        .metric-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 500;
            line-height: 1;
        }

        .metric-sub {
            font-size: 10px;
            color: var(--muted);
            margin-top: 5px;
        }

        .good {
            color: var(--green);
        }

        .warn {
            color: var(--amber);
        }

        .bad {
            color: var(--red);
        }

        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }

        .chart-title {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 14px;
        }

        .chart-wrap {
            position: relative;
            width: 100%;
            height: 230px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--muted);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .state {
            color: var(--muted);
            font-size: 12px;
            padding: 40px;
            text-align: center;
        }

        @media(max-width:600px) {
            .metrics {
                grid-template-columns: repeat(2, 1fr);
            }

            .charts {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div>
            <div class="header-title">100 Days Challenge</div>
            <div class="header-sub" id="updated-at">Loading…</div>
        </div>
    </div>

    <div class="setup-banner">
        <label>Challenge start date</label>
        <input type="date" id="start-date" />
    </div>

    <div id="loading" class="state">Fetching your data…</div>
    <div id="error" class="state" style="display:none;color:var(--red);"></div>

    <div id="dashboard" style="display:none;">
        <div class="metrics">
            <div class="metric">
                <div class="metric-label">Current day</div>
                <div class="metric-value" id="m-day">—</div>
                <div class="metric-sub">of 100</div>
            </div>
            <div class="metric">
                <div class="metric-label">Perfect days</div>
                <div class="metric-value" id="m-perfect">—</div>
                <div class="metric-sub" id="m-perfect-pct">10/10 habits</div>
            </div>
            <div class="metric">
                <div class="metric-label">Current streak</div>
                <div class="metric-value" id="m-streak">—</div>
                <div class="metric-sub">consecutive days</div>
            </div>
            <div class="metric">
                <div class="metric-label">7-day avg</div>
                <div class="metric-value" id="m-avg">—</div>
                <div class="metric-sub" id="m-improvement">habits / day</div>
            </div>
        </div>
        <div class="charts">
            <div class="chart-card">
                <div class="chart-title">Wheel of life — avg by area</div>
                <div class="chart-wrap"><canvas id="radarChart" role="img"
                        aria-label="Radar chart of life areas"></canvas></div>
                <div class="legend" id="radar-legend"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">Score distribution — days by score</div>
                <div class="chart-wrap"><canvas id="donutChart" role="img"
                        aria-label="Donut chart of score distribution"></canvas></div>
                <div class="legend" id="donut-legend"></div>
            </div>
        </div>
    </div>

    <script>
        const AREA_COLORS = ['#7F77DD', '#1D9E75', '#378ADD', '#E24B4A', '#BA7517', '#D4537E'];
        let radarChart = null, donutChart = null;

        function render(data) {
            const startVal = document.getElementById('start-date').value;
            let dayNum = data.daysLogged;
            if (startVal) {
                const diff = Math.floor((Date.now() - new Date(startVal)) / 86400000) + 1;
                dayNum = Math.max(1, Math.min(diff, 100));
            }
            document.getElementById('m-day').textContent = dayNum;

            document.getElementById('m-perfect').textContent = data.perfectDays;
            document.getElementById('m-perfect').className = 'metric-value ' + (data.perfectDays >= 5 ? 'good' : data.perfectDays >= 2 ? 'warn' : '');
            document.getElementById('m-perfect-pct').textContent = data.daysLogged > 0 ? Math.round(data.perfectDays / data.daysLogged * 100) + '% of days logged' : '10/10 habits';

            document.getElementById('m-streak').textContent = data.streak;
            document.getElementById('m-streak').className = 'metric-value ' + (data.streak >= 7 ? 'good' : data.streak >= 3 ? 'warn' : data.streak === 0 ? 'bad' : '');

            document.getElementById('m-avg').textContent = data.avg7.toFixed(1);
            document.getElementById('m-avg').className = 'metric-value ' + (data.avg7 >= 8 ? 'good' : data.avg7 >= 6 ? 'warn' : 'bad');

            const impEl = document.getElementById('m-improvement');
            if (data.improvement !== null) {
                const sign = data.improvement >= 0 ? '+' : '';
                impEl.textContent = sign + data.improvement + '% vs prev 7 days';
                impEl.style.color = data.improvement >= 0 ? 'var(--green)' : 'var(--red)';
            }

            document.getElementById('updated-at').textContent = 'Last updated: ' + new Date(data.updatedAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

            if (radarChart) radarChart.destroy();
            radarChart = new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: { labels: data.areaLabels, datasets: [{ label: 'Avg %', data: data.areaAvgs, backgroundColor: 'rgba(127,119,221,0.12)', borderColor: '#7F77DD', borderWidth: 1.5, pointBackgroundColor: AREA_COLORS, pointRadius: 4, pointHoverRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { r: { min: 0, max: 100, ticks: { stepSize: 25, color: 'rgba(255,255,255,0.3)', font: { size: 9 }, backdropColor: 'transparent' }, grid: { color: 'rgba(255,255,255,0.07)' }, angleLines: { color: 'rgba(255,255,255,0.07)' }, pointLabels: { color: 'rgba(255,255,255,0.5)', font: { size: 10 } } } } }
            });
            document.getElementById('radar-legend').innerHTML = data.areaLabels.map((l, i) =>
                `<div class="legend-item"><div class="legend-dot" style="background:${AREA_COLORS[i]}"></div>${l}: ${data.areaAvgs[i]}%</div>`
            ).join('');

            const palette = ['#E24B4A', '#E24B4A', '#E24B4A', '#BA7517', '#BA7517', '#BA7517', '#1D9E75', '#1D9E75', '#1D9E75', '#7F77DD', '#7F77DD'];
            const dl = [], dd = [], dc = [];
            for (let i = 10; i >= 0; i--) { if (data.scoreDist[i] > 0) { dl.push(i + '/10'); dd.push(data.scoreDist[i]); dc.push(palette[i]); } }
            if (donutChart) donutChart.destroy();
            donutChart = new Chart(document.getElementById('donutChart'), {
                type: 'doughnut',
                data: { labels: dl, datasets: [{ data: dd, backgroundColor: dc, borderColor: '#1a1a1a', borderWidth: 2, hoverOffset: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '62%', plugins: { legend: { display: false } } }
            });
            document.getElementById('donut-legend').innerHTML = dl.map((l, i) =>
                `<div class="legend-item"><div class="legend-dot" style="background:${dc[i]}"></div>${l}: ${dd[i]}d</div>`
            ).join('');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        async function loadDashboard() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                if (!res.ok) throw new Error('data.json not found — run the "Fetch Notion Data" GitHub Action first to generate it.');
                const data = await res.json();
                render(data);
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                const err = document.getElementById('error');
                err.style.display = 'block';
                err.textContent = e.message;
            }
        }

        const saved = localStorage.getItem('lb_start');
        if (saved) document.getElementById('start-date').value = saved;
        document.getElementById('start-date').addEventListener('change', e => {
            localStorage.setItem('lb_start', e.target.value);
            loadDashboard();
        });

        loadDashboard();
    </script>
</body>

</html>
