name: Fetch Notion Data — Dashboard

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:       # manual trigger for testing

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit data.json back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch data from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}   # Daily 10 DB — different from NOTION_PAGE_ID
        run: node fetch-notion-data.js

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push