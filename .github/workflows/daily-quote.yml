name: Daily Quote — Life Balance

on:
  schedule:
    - cron: '0 9 * * *'   # 4:00 AM Bogotá (UTC-5)
  workflow_dispatch:       # trigger manual para probar

jobs:
  update-quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Notion Daily Quote
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: node update-quote.js
